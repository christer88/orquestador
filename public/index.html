<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orquestador VibeCoding</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar__logo">
                <div class="sidebar__logo-icon">🚀</div>
                <div class="sidebar__logo-text">VibeCoding</div>
            </div>
            <nav class="sidebar__nav">
                <a href="#dashboard" class="sidebar__nav-item sidebar__nav-item--active" data-view="dashboard">
                    <span class="icon sidebar__nav-icon">📂</span> Proyectos
                </a>
                <a href="#wizard" class="sidebar__nav-item" data-view="wizard">
                    <span class="icon sidebar__nav-icon">✨</span> Nuevo Proyecto
                </a>
                <a href="#cost-monitor" class="sidebar__nav-item" data-view="cost-monitor">
                    <span class="icon sidebar__nav-icon">📊</span> Monitor Costos
                </a>
                <a href="#accounts" class="sidebar__nav-item" data-view="accounts">
                    <span class="icon sidebar__nav-icon">🔑</span> Cuentas y Claves
                </a>
                <a href="#templates" class="sidebar__nav-item" data-view="templates">
                    <span class="icon sidebar__nav-icon">📋</span> Plantillas
                </a>
            </nav>
        </aside>
        <main class="main-content" id="app-content">
            <!-- Vistas se inyectan aquí -->
        </main>
    </div>
    
    <div id="toast-container"></div>
    <script type="module" src="app.js"></script>
</body>
</html>
